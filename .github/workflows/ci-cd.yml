name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # CI: vet, tests, coverage, and binary build across the required Go matrix.
  ci:
    name: CI - Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify Go version
        run: go version

      - name: go vet
        run: go vet ./...

      - name: Unit test + race detector
        run: go test -race ./... -timeout 30s

      - name: Integration test
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: go test -tags=integration -race ./... -timeout 60s

      - name: Coverage check
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 75.0) }' || {
            echo "Coverage $COVERAGE% is below 75%"
            exit 1
          }
          echo "Coverage $COVERAGE% meets requirement"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-go-${{ matrix.go-version }}
          path: coverage.out

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o bin/taskflow-api ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-api-binary-go-${{ matrix.go-version }}
          path: bin/taskflow-api

  # Security: SCA and SAST gates with JSON reports.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    if: needs.ci.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (SCA)
        id: govulncheck
        continue-on-error: true
        run: |
          echo "=== govulncheck scan (SCA gate) ==="
          govulncheck -json ./... > govulncheck-report.json
          govulncheck ./...
          echo "govulncheck scan completed"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (SAST)
        id: gosec
        continue-on-error: true
        run: |
          echo "=== gosec scan (SAST gate: high severity, medium confidence) ==="
          gosec -severity high -confidence medium -fmt json -out gosec-report.json ./...
          gosec -severity high -confidence medium ./...
          echo "gosec scan completed"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            govulncheck-report.json
            gosec-report.json

      - name: Enforce security gates
        if: always()
        run: |
          if [ "${{ steps.govulncheck.outcome }}" != "success" ]; then
            echo "SCA gate failed: govulncheck found a vulnerability or scan error"
            exit 1
          fi
          if [ "${{ steps.gosec.outcome }}" != "success" ]; then
            echo "SAST gate failed: gosec found high severity findings or scan error"
            exit 1
          fi
          echo "Security gates passed"

  # CD: build and push a SHA-tagged image only after CI and security pass.
  cd:
    name: CD - Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.ci.result == 'success' && needs.security.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Image pushed to ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}"

  # Smoke test: pull the pushed image and verify the deployed endpoints.
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: cd
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_secret
          POSTGRES_DB: taskflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Pull and run image
        env:
          DATABASE_URL: postgres://taskflow:taskflow_secret@localhost:5432/taskflow?sslmode=disable
        run: |
          echo "Pulling image..."
          docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          echo "Starting container..."
          # Run WITHOUT --rm so we can inspect logs if it crashes
          docker run -d \
            --name taskflow-api \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e PORT=8080 \
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          echo "Container started, waiting 2s..."
          sleep 2
          echo "Container status:"
          docker ps -a
          echo "Container logs (first 50 lines):"
          docker logs taskflow-api 2>&1 | head -50 || true

      - name: Wait for startup
        run: |
          echo "Waiting for server to be ready (retrying for 30s)..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is ready after ${i} seconds"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet..."
            # Check if container is still running
            if ! docker ps | grep -q taskflow-api; then
              echo "Container crashed. Logs:"
              docker logs taskflow-api 2>&1 | tail -30 || true
              exit 1
            fi
            docker logs taskflow-api --tail 3 2>&1 || true
            sleep 1
          done
          echo "Server failed to start within 30 seconds"
          echo "Final container logs:"
          docker logs taskflow-api 2>&1 || true
          echo "Container status:"
          docker ps -a
          exit 1

      - name: Smoke test /health
        run: |
          echo "Testing /health endpoint..."
          curl -sf http://localhost:8080/health || (echo "Health check failed"; exit 1)
          echo "/health OK"

      - name: Smoke test /api/v1/stats
        run: |
          echo "Testing /api/v1/stats endpoint..."
          curl -sf http://localhost:8080/api/v1/stats || (echo "Stats endpoint failed"; exit 1)
          echo "/api/v1/stats OK"

      - name: Cleanup container
        if: always()
        run: |
          echo "Container logs at cleanup:"
          docker logs taskflow-api 2>&1 || true
          docker stop taskflow-api 2>&1 || true
          docker rm taskflow-api 2>&1 || true

  # Stable tag: update only after the SHA image passes smoke tests.
  tag-stable:
    name: Tag Stable
    runs-on: ubuntu-latest
    needs: [cd, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && always() && needs.cd.result == 'success' && needs.smoke-test.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Tag and push stable
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }}
          docker tag ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.sha_short }} ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:stable
          docker push ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:stable
          echo "Tagged stable"

  # Notification: logs details and optionally sends Telegram messages.
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [ci, security, cd, smoke-test, tag-stable]
    if: always()

    steps:
      - name: Notify Success
        if: needs.ci.result == 'success' && needs.security.result == 'success' && needs.cd.result == 'success' && needs.smoke-test.result == 'success' && needs.tag-stable.result == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="Pipeline SUCCESS
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "$MESSAGE"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sSf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="$MESSAGE"
          fi

      - name: Notify Failure
        if: needs.ci.result == 'failure' || needs.security.result == 'failure' || needs.cd.result == 'failure' || needs.smoke-test.result == 'failure' || needs.tag-stable.result == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="Pipeline FAILED
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Results: ci=${{ needs.ci.result }}, security=${{ needs.security.result }}, cd=${{ needs.cd.result }}, smoke=${{ needs.smoke-test.result }}, stable=${{ needs.tag-stable.result }}
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "$MESSAGE"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sSf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="$MESSAGE"
          fi
